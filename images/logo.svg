<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Viking Shield Background -->
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C41E3A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C0C0C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A0A0A0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield Shape -->
  <path d="M 150 30 L 220 80 L 220 170 Q 150 240 150 240 Q 150 240 80 170 L 80 80 Z" 
        fill="url(#shieldGrad)" stroke="#FFD700" stroke-width="3"/>
  
  <!-- Viking Helmet (Horns) -->
  <g id="helmet">
    <!-- Left Horn -->
    <path d="M 110 90 Q 80 60 70 40" stroke="#C0C0C0" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Right Horn -->
    <path d="M 190 90 Q 220 60 230 40" stroke="#C0C0C0" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Horn tips -->
    <circle cx="70" cy="40" r="5" fill="#FFD700"/>
    <circle cx="230" cy="40" r="5" fill="#FFD700"/>
    <!-- Helmet Band -->
    <ellipse cx="150" cy="100" rx="50" ry="25" fill="url(#metalGrad)" stroke="#8B0000" stroke-width="2"/>
    <!-- Eye protection -->
    <rect x="130" y="95" width="8" height="20" fill="#333" rx="2"/>
    <rect x="162" y="95" width="8" height="20" fill="#333" rx="2"/>
  </g>
  
  <!-- Crossed Axes/Swords -->
  <g id="weapons" transform="translate(150, 140)">
    <!-- Left Axe -->
    <line x1="-30" y1="-40" x2="0" y2="30" stroke="#FFD700" stroke-width="4" stroke-linecap="round"/>
    <!-- Axe head left -->
    <circle cx="-32" cy="-42" r="12" fill="#C0C0C0" stroke="#8B0000" stroke-width="2"/>
    <ellipse cx="-32" cy="-42" rx="8" ry="14" fill="#A0A0A0"/>
    
    <!-- Right Sword -->
    <line x1="30" y1="-40" x2="0" y2="30" stroke="#FFD700" stroke-width="4" stroke-linecap="round"/>
    <!-- Sword guard right -->
    <rect x="24" y="-48" width="12" height="16" fill="#FFD700" rx="2"/>
  </g>
  
  <!-- Shield Pattern (Nordic Design) -->
  <g id="pattern" opacity="0.3">
    <path d="M 150 100 L 170 120 L 150 140 L 130 120 Z" fill="#FFD700"/>
    <path d="M 150 150 L 170 170 L 150 190 L 130 170 Z" fill="#FFD700"/>
  </g>
  
  <!-- Text: VIKINGS -->
  <text x="150" y="220" font-family="Arial, sans-serif" font-size="28" font-weight="bold" 
        text-anchor="middle" fill="#FFD700" stroke="#8B0000" stroke-width="1"
        letter-spacing="2">VIKINGS</text>
  
  <!-- Bottom banner -->
  <text x="150" y="250" font-family="Georgia, serif" font-size="14" font-style="italic"
        text-anchor="middle" fill="#FFD700" letter-spacing="1">WINGS WARRIORS</text>
</svg>